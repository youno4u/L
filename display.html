<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TULIP: 제한적 속죄 - 송출 화면</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; overflow: hidden; color: white; }
        
        /* 백그라운드 캔버스 (비 내리는 효과) */
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 0; pointer-events: none; }
        
        #content-layer { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }

        /* 화면 흔들림 효과 (4단계용) */
        @keyframes shake { 
            0%, 100% { transform: translate(0, 0); } 
            25% { transform: translate(-3px, 3px) rotate(-1deg); } 
            50% { transform: translate(3px, -3px) rotate(1deg); } 
            75% { transform: translate(-3px, -3px) rotate(0deg); } 
        }
        .shaking { animation: shake 0.1s infinite; }

        /* 은혜 채워짐 펄스 (5단계용) */
        @keyframes glowPulse {
            0% { box-shadow: 0 0 20px rgba(250, 204, 21, 0.5); }
            50% { box-shadow: 0 0 80px rgba(250, 204, 21, 1); }
            100% { box-shadow: 0 0 20px rgba(250, 204, 21, 0.5); }
        }
        .grace-glow { animation: glowPulse 2s infinite; border: 4px solid #facc15; }

        /* 참가자 카드 애니메이션 */
        .player-card { transition: all 0.3s ease; }
        
        .bg-score-high { background-color: #22c55e; }
        .bg-score-mid { background-color: #f97316; }
        .bg-score-low { background-color: #ef4444; }
    </style>
</head>
<body class="w-full h-screen relative">

    <!-- 배경 애니메이션용 캔버스 -->
    <canvas id="bg-canvas"></canvas>

    <!-- 5단계 은혜 오버레이 (숨김 상태로 시작) -->
    <div id="grace-overlay" class="absolute inset-0 bg-yellow-400 bg-opacity-20 z-0 hidden mix-blend-overlay"></div>

    <!-- 전체 화면 패딩을 약간 줄여서 공간 확보 (p-8 -> p-6) -->
    <div id="content-layer" class="p-6">
        <!-- 상단 헤더 (높이 최적화) -->
        <header class="flex justify-between items-end border-b-2 border-slate-700 pb-4 mb-4">
            <div>
                <h1 class="text-5xl font-black text-red-500 mb-1 tracking-tighter">TU<span class="text-red-400">L</span>IP</h1>
                <h2 class="text-3xl font-bold text-slate-300">제한적 속죄 <span class="text-xl text-slate-500 font-normal ml-2">은혜의 성배</span></h2>
            </div>
            <div class="text-right">
                <p class="text-xl font-bold text-slate-400">현재 참가자</p>
                <p class="text-5xl font-black text-white"><span id="total-players">0</span><span class="text-2xl text-slate-500">명</span></p>
            </div>
        </header>

        <div class="flex-grow flex flex-col lg:flex-row gap-6 overflow-hidden">
            
            <!-- 왼쪽: 상태 패널 (크기 최적화 lg:w-1/4) -->
            <div id="status-panel" class="w-full lg:w-1/4 bg-slate-800 bg-opacity-80 backdrop-blur-md rounded-3xl p-6 flex flex-col justify-center border border-slate-700 shadow-2xl transition-all duration-500">
                
                <div id="phase-icon" class="text-6xl text-slate-500 text-center mb-6 drop-shadow-lg">
                    <i class="fas fa-clock"></i>
                </div>
                
                <h3 id="phase-title" class="text-4xl font-black text-center text-white mb-4 leading-tight">대기 중</h3>
                <p id="phase-desc" class="text-lg font-bold text-slate-400 text-center break-keep leading-relaxed">
                    스마트폰을 준비하고 기다려주세요.<br>곧 은혜의 비가 내리기 시작합니다.
                </p>

                <!-- 평균 구원 게이지 -->
                <div class="mt-8 bg-slate-900 rounded-2xl p-4 border border-slate-700">
                    <p class="text-center text-slate-400 text-sm font-bold mb-2">전체 평균 구원 게이지</p>
                    <div class="text-center text-4xl font-black text-white mb-3" id="avg-score-text">100%</div>
                    <div class="w-full bg-slate-800 h-6 rounded-full overflow-hidden">
                        <div id="avg-score-bar" class="h-full bg-green-500 transition-all duration-500" style="width: 100%;"></div>
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 참가자 현황 그리드 (너비 대폭 확대 lg:w-3/4) -->
            <div class="w-full lg:w-3/4 bg-slate-800 bg-opacity-50 backdrop-blur-md rounded-3xl p-5 border border-slate-700 flex flex-col shadow-2xl">
                <h3 class="text-xl font-bold text-slate-300 mb-4 flex justify-between items-center">
                    <span><i class="fas fa-users mr-2"></i>참가자 성배 현황</span>
                </h3>
                
                <!-- 참가자 리스트 영역 -->
                <div id="players-grid" class="flex-grow overflow-y-auto grid content-start pr-2 pb-2">
                    <!-- JS 렌더링 영역 -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const myFirebaseConfig = {
            apiKey: "AIzaSyCfyjgtiDVD4Wsd9iGb9tEdrOGFYxxN2Tw",
            authDomain: "kingdomgenius.firebaseapp.com",
            projectId: "kingdomgenius",
            storageBucket: "kingdomgenius.firebasestorage.app",
            messagingSenderId: "385557748196",
            appId: "1:385557748196:web:457b999a38e4982f188ff1"
        };
        
        let app, auth, db, stateDocRef, playersColRef;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            app = initializeApp(JSON.parse(__firebase_config)); db = getFirestore(app);
            stateDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'tulip_l_state', 'main');
            playersColRef = collection(db, 'artifacts', appId, 'public', 'data', 'tulip_l_players');
        } else {
            app = initializeApp(myFirebaseConfig); db = getFirestore(app);
            stateDocRef = doc(db, 'kingdom_genius_games', 'tulip_l_room', 'data', 'state');
            playersColRef = collection(db, 'kingdom_genius_games', 'tulip_l_room', 'players');
        }
        auth = getAuth(app);

        let currentPhase = 'lobby';
        let playersData = {};

        // --- 백그라운드 비 내리기 효과 캔버스 ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function drawRain() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 페이즈별 비 설정
            let amount = 0; let speedMulti = 1; let color = '#ef4444'; // 붉은 피
            if(currentPhase === 's1') { amount = 20; speedMulti = 0.5; }
            else if(currentPhase === 's2') { amount = 50; speedMulti = 1; }
            else if(currentPhase === 's3') { amount = 150; speedMulti = 2; }
            else if(currentPhase === 's4') { amount = 500; speedMulti = 4; color = '#b91c1c'; } // 폭우
            else if(currentPhase === 's5') { amount = 100; speedMulti = 0.5; color = '#facc15'; } // 은혜 (황금빛)

            // 입자 보충
            while(particles.length < amount) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * -1,
                    l: Math.random() * 20 + 10,
                    s: Math.random() * 5 + 5
                });
            }
            // 입자 제거 (너무 많을 때)
            if(particles.length > amount) particles.splice(0, particles.length - amount);

            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = currentPhase === 's5' ? 3 : 2;
            ctx.lineCap = 'round';

            for(let i=0; i<particles.length; i++) {
                let p = particles[i];
                ctx.moveTo(p.x, p.y);
                
                // 5단계는 사선으로 쏟아지는 듯한 황금빛 효과
                let dx = currentPhase === 's5' ? 2 : 0; 
                ctx.lineTo(p.x + dx, p.y + p.l);
                
                p.y += p.s * speedMulti;
                p.x += dx * speedMulti;
                
                if(p.y > canvas.height) {
                    p.y = Math.random() * -50;
                    p.x = Math.random() * canvas.width;
                }
            }
            ctx.stroke();
            requestAnimationFrame(drawRain);
        }
        drawRain();

        // --- Firebase 연동 ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
                setupRealtimeListeners();
            } catch (error) { console.error("Auth error:", error); }
        };
        window.addEventListener('DOMContentLoaded', initAuth);

        function setupRealtimeListeners() {
            onSnapshot(stateDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    currentPhase = docSnap.data().phase || 'lobby';
                    updateDisplayPhase();
                }
            });

            onSnapshot(playersColRef, (querySnapshot) => {
                playersData = {};
                let totalScore = 0;
                let count = 0;

                querySnapshot.forEach((doc) => { 
                    const data = doc.data();
                    playersData[doc.id] = data; 
                    totalScore += (data.score || 0);
                    count++;
                });
                
                document.getElementById('total-players').innerText = count;
                
                // 평균 점수 계산 (소수점 제거)
                const avgScore = count > 0 ? Math.floor(totalScore / count) : 100;
                document.getElementById('avg-score-text').innerText = avgScore + '%';
                const avgBar = document.getElementById('avg-score-bar');
                avgBar.style.width = avgScore + '%';
                avgBar.className = `h-full transition-all duration-500 ${avgScore >= 70 ? 'bg-green-500' : (avgScore >= 30 ? 'bg-orange-500' : 'bg-red-600')}`;

                renderPlayersGrid(count);
            });
        }

        // --- UI 업데이트 함수 ---
        function updateDisplayPhase() {
            const panel = document.getElementById('status-panel');
            const icon = document.getElementById('phase-icon');
            const title = document.getElementById('phase-title');
            const desc = document.getElementById('phase-desc');
            const graceOverlay = document.getElementById('grace-overlay');
            const body = document.body;

            // 초기화
            panel.classList.remove('bg-red-900', 'bg-yellow-900', 'shaking', 'grace-glow', 'border-red-500', 'border-yellow-400');
            body.classList.remove('shaking');
            graceOverlay.classList.add('hidden');

            switch(currentPhase) {
                case 'lobby':
                    icon.innerHTML = '<i class="fas fa-coffee text-slate-500"></i>';
                    title.innerText = "대기 중"; title.className = "text-4xl font-black text-center text-white mb-4";
                    desc.innerHTML = "스마트폰을 준비하고 기다려주세요.<br>곧 은혜의 비가 내리기 시작합니다.";
                    break;
                case 's1':
                    icon.innerHTML = '<i class="fas fa-cloud-rain text-blue-400"></i>';
                    title.innerText = "1단계: 이슬비"; title.className = "text-4xl font-black text-center text-blue-300 mb-4";
                    desc.innerHTML = "은혜가 내리기 시작합니다.<br>스마트폰을 기울여 피를 담으세요!";
                    break;
                case 's2':
                    icon.innerHTML = '<i class="fas fa-cloud-showers-heavy text-indigo-400"></i>';
                    title.innerText = "2단계: 소나기"; title.className = "text-4xl font-black text-center text-indigo-300 mb-4";
                    desc.innerHTML = "조금씩 빨라집니다.<br>노력으로 은혜를 유지할 수 있을까요?";
                    break;
                case 's3':
                    icon.innerHTML = '<i class="fas fa-bolt text-purple-400"></i>';
                    title.innerText = "3단계: 장대비"; title.className = "text-4xl font-black text-center text-purple-300 mb-4";
                    desc.innerHTML = "구원을 유지하기가 벅차오릅니다.<br>우리의 무능력이 드러납니다.";
                    break;
                case 's4':
                    icon.innerHTML = '<i class="fas fa-skull-crossbones text-red-500"></i>';
                    title.innerText = "전적 무능력"; 
                    title.className = "text-5xl font-black text-center text-red-500 mb-4 drop-shadow-[0_0_20px_rgba(239,68,68,1)]";
                    desc.innerHTML = "<span class='text-red-300 text-2xl'>쏟아지는 은혜를 감당할 수 없습니다!</span><br>인간의 능력으로는 구원에 이를 수 없습니다.";
                    panel.classList.add('bg-red-900', 'border-red-500', 'shaking');
                    break;
                case 's5':
                    icon.innerHTML = '<i class="fas fa-cross text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,1)]"></i>';
                    title.innerText = "제한적 속죄"; 
                    title.className = "text-5xl font-black text-center text-yellow-400 mb-4 drop-shadow-[0_0_20px_rgba(250,204,21,1)]";
                    desc.innerHTML = "<span class='text-yellow-200 text-2xl'>불가항력적 은혜가 명중했습니다!</span><br>우리의 무능력에도 불구하고, 그리스도의 보혈이 우리를 완전히 채우십니다.";
                    panel.classList.add('bg-yellow-900', 'border-yellow-400', 'grace-glow');
                    graceOverlay.classList.remove('hidden');
                    break;
            }
        }

        // 🔥 40명도 거뜬한 자동 스케일링(Dynamic Scaling) 시스템 🔥
        function renderPlayersGrid(count) {
            const grid = document.getElementById('players-grid');
            grid.innerHTML = '';

            // 접속 인원 수에 따라 카드의 열(Column) 개수와 패딩, 글자 크기를 동적으로 변화시킵니다.
            let gridCols = 'grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-7'; // 기본 크기
            let textSizeName = 'text-lg';
            let textSizeScore = 'text-3xl';
            let paddingClass = 'p-3';
            let gapClass = 'gap-4';

            if (count > 35) {
                // 35명 초과: 아주 작게 (한 줄에 9~10개)
                gridCols = 'grid-cols-6 sm:grid-cols-7 md:grid-cols-8 lg:grid-cols-10';
                textSizeName = 'text-[0.65rem]';
                textSizeScore = 'text-base';
                paddingClass = 'p-1.5';
                gapClass = 'gap-1.5';
            } else if (count > 24) {
                // 25~35명: 작게 (한 줄에 7~8개)
                gridCols = 'grid-cols-5 sm:grid-cols-6 md:grid-cols-7 lg:grid-cols-8';
                textSizeName = 'text-xs';
                textSizeScore = 'text-xl';
                paddingClass = 'p-2';
                gapClass = 'gap-2';
            } else if (count > 15) {
                // 16~24명: 중간 (한 줄에 6~7개)
                gridCols = 'grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-7';
                textSizeName = 'text-sm';
                textSizeScore = 'text-2xl';
                paddingClass = 'p-2.5';
                gapClass = 'gap-3';
            }

            // 그리드 클래스 교체
            grid.className = `flex-grow overflow-y-auto grid ${gridCols} ${gapClass} pr-2 pb-2 content-start`;

            // 점수순 정렬
            const sortedPlayers = Object.entries(playersData).sort((a, b) => (b[1].score || 0) - (a[1].score || 0));

            sortedPlayers.forEach(([uid, data]) => {
                const score = data.score || 0;
                let colorClass = 'bg-score-high';
                if(score < 70) colorClass = 'bg-score-mid';
                if(score < 30) colorClass = 'bg-score-low';

                let extraEffect = '';
                if(currentPhase === 's4' && score < 50) extraEffect = 'animate-pulse';
                if(currentPhase === 's5') colorClass = 'bg-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.8)]';

                const card = document.createElement('div');
                card.className = `player-card bg-slate-900 rounded-2xl ${paddingClass} flex flex-col items-center border border-slate-700 shadow-lg relative overflow-hidden`;
                
                card.innerHTML = `
                    <div class="font-black text-slate-200 truncate w-full text-center ${textSizeName} z-10 mb-1">${data.name}</div>
                    <div class="font-black ${textSizeScore} z-10 ${currentPhase === 's5' ? 'text-yellow-400' : 'text-white'}">${score}%</div>
                    
                    <!-- 컵 모양 배경 게이지 -->
                    <div class="absolute bottom-0 left-0 w-full opacity-60 ${extraEffect} transition-all duration-300 ${colorClass}" style="height: ${score}%;"></div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
