<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TULIP: 제한적 속죄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; overflow: hidden; touch-action: none; color: white; }
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        .active { display: flex; }
        
        /* 성배 디자인 */
        #cup-container { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); width: 100px; height: 120px; z-index: 20; transition: left 0.1s ease-out; }
        .cup-body { width: 100%; height: 100%; border: 4px solid #cbd5e1; border-top: none; border-radius: 0 0 40px 40px; position: relative; overflow: hidden; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #cup-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, #b91c1c, #ef4444); transition: height 0.3s ease; }
        
        /* 4단계 화면 흔들림 */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px) rotate(-2deg); }
            50% { transform: translate(5px, -5px) rotate(2deg); }
            75% { transform: translate(-5px, -5px) rotate(0deg); }
        }
        .shaking { animation: shake 0.1s infinite; }

        /* 5단계 은혜 채워짐 연출 (황금빛) */
        .grace-glow #cup-fill { background: linear-gradient(to top, #eab308, #facc15) !important; box-shadow: 0 0 30px #facc15; }
        .grace-glow .cup-body { border-color: #fef08a; box-shadow: 0 0 50px rgba(250, 204, 21, 0.6); }

        canvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
        .ui-layer { position: relative; z-index: 30; pointer-events: none; }
        .interactive-ui { pointer-events: auto; }
    </style>
</head>
<body>

    <!-- 1. 로그인 (대기) 화면 -->
    <div id="screen-login" class="screen active flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-black text-red-500 mb-2 drop-shadow-md tracking-tighter">TU<span class="text-red-400">L</span>IP</h1>
        <h2 class="text-3xl font-bold text-slate-300 mb-8">제한적 속죄</h2>
        
        <div class="bg-slate-800 p-8 rounded-3xl w-full max-w-sm border border-slate-700 shadow-2xl">
            <input type="text" id="player-name" placeholder="이름을 입력하세요" class="w-full text-center text-2xl p-4 rounded-xl mb-6 bg-slate-900 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:border-red-500 transition-colors" maxlength="8">
            <button id="btn-join" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl text-xl transition-colors shadow-lg active:scale-95">입장하기</button>
        </div>
        <p class="text-slate-500 mt-6 text-sm">GM 모드로 진입하려면 이름에 'gm'을 입력하세요.</p>
    </div>

    <!-- 2. 플레이어 화면 -->
    <div id="screen-player" class="screen flex-col relative overflow-hidden bg-slate-900">
        
        <canvas id="game-canvas"></canvas>

        <div class="ui-layer w-full h-full p-6 flex flex-col justify-between">
            <div class="flex justify-between items-start">
                <div class="bg-slate-800 bg-opacity-80 px-4 py-2 rounded-full border border-slate-700">
                    <span id="p-name-disp" class="font-bold text-slate-300">이름</span>
                </div>
                <div class="text-right bg-slate-800 bg-opacity-80 px-4 py-2 rounded-2xl border border-slate-700 flex flex-col items-end">
                    <span class="text-xs text-slate-400 font-bold mb-1">구원 게이지</span>
                    <span id="p-score-disp" class="font-black text-3xl text-white">100%</span>
                </div>
            </div>

            <!-- 중앙 지시문 -->
            <div id="p-instruction" class="text-center transition-all duration-500">
                <h3 id="p-inst-title" class="text-3xl font-black text-white mb-2 drop-shadow-lg">대기 중</h3>
                <p id="p-inst-desc" class="text-lg text-slate-300 bg-slate-900 bg-opacity-60 inline-block px-4 py-2 rounded-xl">스크린을 주목해 주세요.</p>
            </div>

            <div class="h-24"></div> <!-- 하단 여백 -->
        </div>

        <!-- 성배 -->
        <div id="cup-container">
            <div class="cup-body">
                <div id="cup-fill" style="height: 100%;"></div>
            </div>
        </div>

        <!-- 5단계 불가항력적 은혜 오버레이 -->
        <div id="p-grace-overlay" class="absolute inset-0 bg-yellow-500 bg-opacity-30 z-40 hidden flex-col items-center justify-center backdrop-blur-sm">
            <div class="text-6xl text-yellow-300 mb-4 drop-shadow-[0_0_20px_rgba(253,224,71,1)]"><i class="fas fa-cross"></i></div>
            <h2 class="text-4xl font-black text-white drop-shadow-lg text-center leading-tight">불가항력적<br><span class="text-yellow-300">은혜!</span></h2>
        </div>
    </div>

    <!-- 3. GM 통제 화면 -->
    <div id="screen-gm" class="screen flex-col p-6 bg-slate-900 overflow-y-auto">
        <header class="mb-6 border-b border-slate-700 pb-4">
            <h2 class="text-3xl font-black text-red-500 flex items-center"><i class="fas fa-gamepad mr-3"></i>GM 컨트롤 패널</h2>
            <div class="flex justify-between items-center mt-2">
                <span class="text-slate-400">접속자: <span id="gm-player-count" class="font-bold text-white">0</span>명</span>
                <button onclick="resetGame()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors"><i class="fas fa-trash-alt mr-2"></i>전체 초기화(강제퇴장)</button>
            </div>
        </header>

        <div class="grid gap-4 mb-6">
            <button onclick="setPhase('lobby')" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-xl border-2 border-slate-600 flex justify-between px-6 items-center">
                <span><i class="fas fa-home mr-2 text-slate-400"></i>대기실 (Lobby)</span>
            </button>
            <button onclick="setPhase('s1')" class="bg-blue-900 hover:bg-blue-800 text-blue-100 font-bold py-4 rounded-xl border-2 border-blue-700 flex justify-between px-6 items-center">
                <span><i class="fas fa-cloud-rain mr-2 text-blue-400"></i>1단계: 이슬비</span>
            </button>
            <button onclick="setPhase('s2')" class="bg-indigo-900 hover:bg-indigo-800 text-indigo-100 font-bold py-4 rounded-xl border-2 border-indigo-700 flex justify-between px-6 items-center">
                <span><i class="fas fa-cloud-showers-heavy mr-2 text-indigo-400"></i>2단계: 소나기</span>
            </button>
            <button onclick="setPhase('s3')" class="bg-purple-900 hover:bg-purple-800 text-purple-100 font-bold py-4 rounded-xl border-2 border-purple-700 flex justify-between px-6 items-center">
                <span><i class="fas fa-bolt mr-2 text-purple-400"></i>3단계: 장대비</span>
            </button>
            <button onclick="setPhase('s4')" class="bg-red-900 hover:bg-red-800 text-red-100 font-bold py-5 rounded-xl border-2 border-red-600 flex justify-between px-6 items-center transform scale-105 shadow-lg">
                <span class="text-xl"><i class="fas fa-skull-crossbones mr-2 text-red-400"></i>4단계: 폭우 (전적 무능력)</span>
            </button>
            <button onclick="setPhase('s5')" class="bg-yellow-600 hover:bg-yellow-500 text-yellow-50 font-bold py-5 rounded-xl border-2 border-yellow-400 flex justify-between px-6 items-center transform scale-105 shadow-lg">
                <span class="text-xl"><i class="fas fa-cross mr-2 text-yellow-300"></i>5단계: 불가항력적 은혜 선포</span>
            </button>
        </div>
        
        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
            <h3 class="text-slate-400 font-bold mb-2">현재 단계: <span id="gm-current-phase" class="text-white">lobby</span></h3>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 파이어베이스 설정
        const myFirebaseConfig = {
            apiKey: "AIzaSyCfyjgtiDVD4Wsd9iGb9tEdrOGFYxxN2Tw",
            authDomain: "kingdomgenius.firebaseapp.com",
            projectId: "kingdomgenius",
            storageBucket: "kingdomgenius.firebasestorage.app",
            messagingSenderId: "385557748196",
            appId: "1:385557748196:web:457b999a38e4982f188ff1"
        };
        
        let app, auth, db, stateDocRef, playersColRef;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            app = initializeApp(JSON.parse(__firebase_config)); db = getFirestore(app);
            stateDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'tulip_l_state', 'main');
            playersColRef = collection(db, 'artifacts', appId, 'public', 'data', 'tulip_l_players');
        } else {
            app = initializeApp(myFirebaseConfig); db = getFirestore(app);
            stateDocRef = doc(db, 'kingdom_genius_games', 'tulip_l_room', 'data', 'state');
            playersColRef = collection(db, 'kingdom_genius_games', 'tulip_l_room', 'players');
        }
        auth = getAuth(app);

        // 전역 상태 관리
        window.myRole = null; 
        window.myUid = null;
        window.myName = "";
        window.myScore = 100;
        window.gameState = { phase: 'lobby' };
        window.playersData = {};

        // 게임용 변수
        let drops = []; // 떨어지는 피 배열 (캔버스 렌더링용)
        let gameLoopId = null;
        let lastDbSync = 0;
        let isPlaying = false;
        let graceTimeout = null; // 5단계 멘트 지연용 타이머
        
        // 캔버스 사이즈 조정
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);

        // 난이도 설정 (spawnChance: 프레임당 생성확률, speed: 떨어지는 속도(%/프레임), penalty: 놓쳤을때 깎이는 점수)
        // 1단계 아주 쉽게 조정!
        const diffConfig = {
            's1': { spawnChance: 0.008, speed: 0.25, penalty: 0.1 }, // 매우 느리고 적게 떨어짐, 패널티 미미함
            's2': { spawnChance: 0.03, speed: 0.6, penalty: 0.2 },  
            's3': { spawnChance: 0.06, speed: 0.9, penalty: 0.2 },  
            's4': { spawnChance: 0.8, speed: 1.5, penalty: 2 },   // 멘붕 (엄청난 양의 피)
            's5': { spawnChance: 0.5, speed: 1.2, penalty: 0 }    // 은혜 채워짐
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (error) { console.error("Auth init error", error); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.myUid = user.uid;
                setupRealtimeListeners();
            }
        });

        function setupRealtimeListeners() {
            // 게임 상태(Phase) 리스너
            onSnapshot(stateDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    window.gameState = docSnap.data();
                    updateUIBasedOnRole();
                }
            });

            // 플레이어 목록 리스너
            onSnapshot(playersColRef, (querySnapshot) => {
                window.playersData = {};
                querySnapshot.forEach((doc) => { window.playersData[doc.id] = doc.data(); });
                
                updateUIBasedOnRole();
                
                // 플레이어인데 내 데이터가 사라졌다면(GM 전체 초기화 시) 로그인 화면으로 강퇴
                // iframe 정책상 alert() 금지. 그냥 바로 튕겨냅니다.
                if (window.myRole === 'player' && isPlaying && !window.playersData[window.myUid]) {
                    console.log("강제 퇴장 처리됨");
                    window.myRole = null;
                    isPlaying = false;
                    if(gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
                    document.getElementById('player-name').value = ''; // 이름 비우기
                    switchScreen('screen-login');
                }
            });
        }

        window.switchScreen = (id) => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); };

        // UI 업데이트
        function updateUIBasedOnRole() {
            const phase = window.gameState.phase || 'lobby';

            // 플레이어 UI 업데이트
            if (window.myRole === 'player') {
                const pData = window.playersData[window.myUid];
                if (pData) {
                    window.myScore = pData.score;
                    document.getElementById('p-score-disp').innerText = Math.floor(window.myScore) + '%';
                    document.getElementById('cup-fill').style.height = window.myScore + '%';
                }

                const instTitle = document.getElementById('p-inst-title');
                const instDesc = document.getElementById('p-inst-desc');
                const gameArea = document.getElementById('screen-player');
                const cupContainer = document.getElementById('cup-container');
                const graceOverlay = document.getElementById('p-grace-overlay');

                graceOverlay.classList.add('hidden');
                graceOverlay.classList.remove('flex');
                gameArea.classList.remove('shaking', 'grace-glow');
                cupContainer.classList.remove('hidden');
                
                // 이전 딜레이 타이머가 있다면 초기화
                if(graceTimeout) clearTimeout(graceTimeout);

                if (phase === 'lobby') {
                    instTitle.innerText = "대기 중"; instTitle.className = "text-3xl font-black text-white mb-2";
                    instDesc.innerText = "화면을 주목해 주세요.";
                    drops = []; // 피 비우기
                } 
                else if (phase === 's1' || phase === 's2' || phase === 's3') {
                    instTitle.innerText = "스마트폰을 기울이세요!"; instTitle.className = "text-3xl font-black text-blue-300 mb-2";
                    instDesc.innerText = "위에서 떨어지는 은혜(피)를\n성배에 온전히 담으세요.";
                }
                else if (phase === 's4') {
                    instTitle.innerText = "감당할 수 없는 폭우!!"; instTitle.className = "text-3xl font-black text-red-500 drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]";
                    instDesc.innerHTML = "당신의 능력으로는<br>이 많은 은혜를 다 받을 수 없습니다!";
                    gameArea.classList.add('shaking'); // 화면 흔들림 효과
                }
                else if (phase === 's5') {
                    instTitle.innerText = ""; instDesc.innerText = "";
                    gameArea.classList.add('grace-glow'); // 황금빛 성배 연출
                    
                    // 5단계: 은혜가 중앙으로 빨려들어가는 것을 4초간 보여준 뒤 멘트 표시
                    graceTimeout = setTimeout(() => {
                        if(window.gameState.phase === 's5') {
                            graceOverlay.classList.remove('hidden');
                            graceOverlay.classList.add('flex');
                        }
                    }, 4000);
                }
            }
            
            // GM UI 업데이트
            if (window.myRole === 'gm') {
                document.getElementById('gm-player-count').innerText = Object.keys(window.playersData).length;
                document.getElementById('gm-current-phase').innerText = phase;
            }
        }

        // 로그인 버튼 클릭
        document.getElementById('btn-join').addEventListener('click', async () => {
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) return;

            if (nameInput.toLowerCase() === 'gm') {
                window.myRole = 'gm';
                switchScreen('screen-gm');
            } else {
                window.myName = nameInput;
                window.myRole = 'player';
                window.myScore = 100;
                isPlaying = true;
                
                // 플레이어 데이터 초기 생성
                await setDoc(doc(playersColRef, window.myUid), {
                    name: window.myName,
                    score: 100
                });

                resizeCanvas();
                switchScreen('screen-player');
                document.getElementById('p-name-disp').innerText = window.myName;
                
                // 자이로센서 권한 요청 (iOS 대응)
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(response => { if (response == 'granted') window.addEventListener('deviceorientation', handleOrientation); })
                        .catch(console.error);
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
                
                startGameLoop();
            }
        });

        // 스마트폰 기울기 센서 처리 (좌우)
        let cupLeft = 50; // 기본 위치 50%
        function handleOrientation(event) {
            if(!isPlaying) return;
            let gamma = event.gamma; // 좌우 기울기 (-90 ~ 90)
            if (gamma > 45) gamma = 45;
            if (gamma < -45) gamma = -45;
            
            // gamma 값을 화면 10% ~ 90% 위치로 변환
            cupLeft = 50 + (gamma / 45) * 40; 
            document.getElementById('cup-container').style.left = cupLeft + '%';
        }

        // 터치 지원 (자이로센서가 없는 기기나 PC 테스트용)
        let isDragging = false;
        document.getElementById('screen-player').addEventListener('touchstart', (e) => { isDragging = true; updateCupPosByTouch(e.touches[0].clientX); });
        document.getElementById('screen-player').addEventListener('touchmove', (e) => { if(isDragging) updateCupPosByTouch(e.touches[0].clientX); });
        document.getElementById('screen-player').addEventListener('touchend', () => { isDragging = false; });
        document.getElementById('screen-player').addEventListener('mousedown', (e) => { isDragging = true; updateCupPosByTouch(e.clientX); });
        document.getElementById('screen-player').addEventListener('mousemove', (e) => { if(isDragging) updateCupPosByTouch(e.clientX); });
        document.getElementById('screen-player').addEventListener('mouseup', () => { isDragging = false; });

        function updateCupPosByTouch(clientX) {
            cupLeft = (clientX / window.innerWidth) * 100;
            if(cupLeft < 10) cupLeft = 10;
            if(cupLeft > 90) cupLeft = 90;
            document.getElementById('cup-container').style.left = cupLeft + '%';
        }

        // --- 메인 게임 루프 (플레이어용) ---
        function startGameLoop() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            let prevTime = performance.now();
            
            function loop(currentTime) {
                if(!isPlaying) return;
                
                const dt = currentTime - prevTime;
                prevTime = currentTime;
                
                const phase = window.gameState.phase;
                if(phase && diffConfig[phase]) {
                    const cfg = diffConfig[phase];
                    
                    // 피 생성
                    if(Math.random() < cfg.spawnChance) {
                        drops.push({
                            x: Math.random() * canvas.width,
                            y: -20,
                            size: Math.random() * 8 + 4,
                            speed: cfg.speed * (dt/16) // 프레임 보정
                        });
                    }

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    const cupContainer = document.getElementById('cup-container');
                    const cupRect = cupContainer.getBoundingClientRect();
                    
                    let scoreChanged = false;

                    // 5단계는 모든 피가 성배로 빨려들어감
                    const isPhase5 = (phase === 's5');

                    for(let i=drops.length-1; i>=0; i--) {
                        let d = drops[i];
                        
                        if (isPhase5) {
                            // 성배 중앙 좌표로 자석처럼 끌어당김
                            const targetX = cupRect.left + cupRect.width/2;
                            const targetY = cupRect.top + 20; // 컵 상단 부근
                            
                            d.x += (targetX - d.x) * 0.05;
                            d.y += (targetY - d.y) * 0.05;
                        } else {
                            d.y += d.speed * 10; // 픽셀 속도 보정
                        }

                        // 그리기 (5단계는 황금빛, 나머지는 붉은 피)
                        ctx.beginPath();
                        ctx.fillStyle = isPhase5 ? '#facc15' : '#ef4444';
                        ctx.shadowBlur = isPhase5 ? 10 : 0;
                        ctx.shadowColor = isPhase5 ? '#eab308' : 'transparent';
                        ctx.arc(d.x, d.y, d.size, 0, Math.PI*2);
                        ctx.fill();

                        // 충돌 판정 및 화면 벗어남 판정
                        if(d.y > canvas.height) {
                            // 놓침 (바닥에 떨어짐)
                            if(!isPhase5 && phase !== 'lobby') {
                                window.myScore -= cfg.penalty;
                                if(window.myScore < 0) window.myScore = 0;
                                scoreChanged = true;
                            }
                            drops.splice(i, 1);
                        } 
                        else if (d.y > cupRect.top && d.y < cupRect.bottom && d.x > cupRect.left && d.x < cupRect.right) {
                            // 받음 (컵에 들어감)
                            if(isPhase5) {
                                // 5단계는 받으면 점수가 팍팍 오름
                                window.myScore += 2;
                                if(window.myScore > 100) window.myScore = 100;
                                scoreChanged = true;
                            }
                            drops.splice(i, 1);
                        }
                    }

                    // 5단계일 경우 계속 100%를 향해 자동으로도 조금씩 회복
                    if(isPhase5 && window.myScore < 100) {
                        window.myScore += 0.5;
                        if(window.myScore > 100) window.myScore = 100;
                        scoreChanged = true;
                    }

                    // DB 동기화 (트래픽 방지를 위해 0.5초마다 1번씩만 전송)
                    if(scoreChanged) {
                        document.getElementById('cup-fill').style.height = window.myScore + '%';
                        document.getElementById('p-score-disp').innerText = Math.floor(window.myScore) + '%';
                        
                        const now = Date.now();
                        if(now - lastDbSync > 500) {
                            setDoc(doc(playersColRef, window.myUid), { score: window.myScore }, { merge: true });
                            lastDbSync = now;
                        }
                    }
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); // 대기실일땐 비움
                }

                gameLoopId = requestAnimationFrame(loop);
            }
            gameLoopId = requestAnimationFrame(loop);
        }

        // --- GM 기능 ---
        window.setPhase = async (newPhase) => { 
            await setDoc(stateDocRef, { phase: newPhase }, { merge: true }); 
        };
        
        window.resetGame = async () => { 
            // iframe 내장 alert/confirm 차단 문제 해결: 묻지 않고 즉시 실행
            console.log("초기화 및 강제퇴장 실행");
            
            // 1. 상태를 대기실로 변경
            await setDoc(stateDocRef, { phase: 'lobby' });
            
            // 2. 현재 등록된 모든 참가자 문서 삭제 (강제 퇴장 트리거)
            const pKeys = Object.keys(window.playersData || {});
            
            // 병렬로 빠르게 삭제 처리
            const deletePromises = pKeys.map(uid => deleteDoc(doc(playersColRef, uid)));
            await Promise.all(deletePromises);
            
            console.log(`${pKeys.length}명 퇴장 완료`);
        };

        window.addEventListener('DOMContentLoaded', initAuth);
    </script>
